appId: sh.paseo.desktop
productName: Paseo
executableName: Paseo
directories:
  output: release
files:
  - dist/**/*
extraResources:
  - from: ../app/dist
    to: app-dist
publish:
  provider: github
  owner: getpaseo
  repo: paseo
mac:
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  hardenedRuntime: true
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extraResources:
    - from: bin/paseo
      to: bin/paseo
  target:
    - dmg
    - zip
linux:
  category: Development
  icon: assets
  extraResources:
    - from: bin/paseo
      to: bin/paseo
  target:
    - AppImage
    - tar.gz
win:
  icon: assets/icon.ico
  extraResources:
    - from: bin/paseo.cmd
      to: bin/paseo.cmd
  target:
    - nsis
    - zip
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
